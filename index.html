<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sito in Manutenzione</title>
    <meta name="description" content="Il sito è attualmente in manutenzione.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b0f19;
            --text-primary: #ffffff;
            --accent-gradient: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Gradients */
        .bg-glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            filter: blur(80px);
            z-index: 1;
            animation: float-glow 20s infinite alternate ease-in-out;
        }

        .bg-glow-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(29, 78, 216, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            filter: blur(80px);
            z-index: 1;
            animation: float-glow 25s infinite alternate-reverse ease-in-out;
        }

        @keyframes float-glow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(6%, 6%) scale(1.15); }
        }

        /* Container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 24px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.03em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            text-shadow: 0 0 40px rgba(165, 180, 252, 0.1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Dynamic Background Elements -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="container">
        <h1>Sito in Manutenzione</h1>
    </div>

</body>
</html>
