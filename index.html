<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sito in Manutenzione | Torneremo Presto</title>
    <meta name="description" content="Il nostro sito è attualmente in manutenzione. Stiamo lavorando per offrirvi un'esperienza migliore. Torneremo presto online!">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #60a5fa 0%, #3b82f6 50%, #1d4ed8 100%);
            --glow-color: rgba(59, 130, 246, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Gradients */
        .bg-glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            filter: blur(80px);
            z-index: 1;
            animation: float-glow 20s infinite alternate ease-in-out;
        }

        .bg-glow-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(29, 78, 216, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            filter: blur(80px);
            z-index: 1;
            animation: float-glow 25s infinite alternate-reverse ease-in-out;
        }

        @keyframes float-glow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(8%, 8%) scale(1.2); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 540px;
            padding: 24px;
            text-align: center;
        }

        /* Glassmorphism Card */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 48px 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo / Animated Icon */
        .icon-wrapper {
            margin-bottom: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .maintenance-icon {
            font-size: 3.5rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse-icon 3s ease-in-out infinite;
        }

        .gear-back {
            position: absolute;
            font-size: 1.5rem;
            color: rgba(96, 165, 250, 0.3);
            top: -5px;
            right: -15px;
            animation: spin 10s linear infinite;
        }

        .gear-front {
            position: absolute;
            font-size: 2rem;
            color: rgba(96, 165, 250, 0.5);
            bottom: -5px;
            left: -20px;
            animation: spin-reverse 8s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @keyframes spin-reverse {
            100% { transform: rotate(-360deg); }
        }

        @keyframes pulse-icon {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 15px rgba(96, 165, 250, 0.5)); }
        }

        /* Text Styles */
        .badge {
            display: inline-block;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            animation: pulse-badge 2s infinite alternate;
        }

        @keyframes pulse-badge {
            0% { border-color: rgba(59, 130, 246, 0.2); box-shadow: 0 0 0 rgba(59, 130, 246, 0); }
            100% { border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 0 8px rgba(59, 130, 246, 0.2); }
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 32px;
            font-weight: 300;
        }

        /* Progress Bar */
        .progress-container {
            margin-bottom: 36px;
            text-align: left;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 9999px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .progress-fill {
            height: 100%;
            width: 75%;
            background: var(--accent-gradient);
            border-radius: 9999px;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.5);
            position: relative;
            animation: shimmer 2s infinite linear;
            background-size: 200% 100%;
            background-image: linear-gradient(
                90deg,
                #60a5fa 0%,
                #3b82f6 25%,
                #60a5fa 50%,
                #3b82f6 75%,
                #60a5fa 100%
            );
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Interactive Form */
        .form-group {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        input[type="email"] {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            color: #ffffff;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input[type="email"]:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(96, 165, 250, 0.5);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
        }

        input[type="email"]:focus + i {
            color: #60a5fa;
        }

        button {
            width: 100%;
            padding: 16px 24px;
            background: var(--accent-gradient);
            color: #ffffff;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        /* Success Message styling */
        .success-message {
            display: none;
            color: #34d399;
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.2);
            padding: 14px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
            animation: fadeIn 0.5s ease;
        }

        /* Social Links */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 28px;
        }

        .social-link {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            transform: translateY(-3px);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .card {
                padding: 36px 24px;
            }
            h1 {
                font-size: 1.85rem;
            }
            p {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <!-- Dynamic Background Elements -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="container">
        <div class="card">
            
            <!-- Badges & Animated Icon -->
            <div class="badge">Offline</div>
            <div class="icon-wrapper">
                <i class="fa-solid fa-gears maintenance-icon"></i>
                <i class="fa-solid fa-gear gear-back"></i>
                <i class="fa-solid fa-gear gear-front"></i>
            </div>

            <!-- Headings -->
            <h1>Sito in Manutenzione</h1>
            <p>Stiamo aggiornando il nostro sito web per offrirvi la migliore esperienza possibile. Torniamo online tra pochissimo!</p>

            <!-- Progress Indicator -->
            <div class="progress-container">
                <div class="progress-info">
                    <span>Stato aggiornamento</span>
                    <span>75%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>

            <!-- Interactivity / Notify Form -->
            <form id="notifyForm" onsubmit="handleNotify(event)">
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="emailInput" placeholder="Inserisci la tua email..." required>
                    </div>
                    <button type="submit">Avvisami quando è pronto</button>
                </div>
            </form>
            <div id="successMsg" class="success-message">
                <i class="fa-regular fa-circle-check" style="margin-right: 8px;"></i>
                Grazie! Ti invieremo una notifica non appena saremo online.
            </div>

            <!-- Social Links & Contact -->
            <div class="social-links">
                <a href="mailto:info@tuodominio.it" class="social-link" title="Invia un'email">
                    <i class="fa-regular fa-envelope"></i>
                </a>
                <a href="#" class="social-link" title="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="#" class="social-link" title="Facebook">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>
                <a href="#" class="social-link" title="LinkedIn">
                    <i class="fa-brands fa-linkedin-in"></i>
                </a>
            </div>

        </div>
    </div>

    <script>
        function handleNotify(event) {
            event.preventDefault();
            const email = document.getElementById('emailInput').value;
            if (email) {
                // Mock form submission logic
                document.getElementById('notifyForm').style.display = 'none';
                const successMsg = document.getElementById('successMsg');
                successMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
